<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel to KML / KMZ</title>

  <!-- Handsontable -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.js"></script>

  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="title-group">
        <h1>Excel to KML / KMZ</h1>
        <p>Paste your Excel rows and export valid coordinates</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="btnClear">Clear Sheet</button>
      <button class="btn btn-primary" id="btnExportKML">Export KML</button>
      <button class="btn btn-primary" id="btnExportKMZ">Export KMZ</button>
    </div>
  </header>

  <main class="container">
    <section class="table-card">
      <div class="table-header">
        <h2>Data Grid</h2>
        <span class="table-note">Expected columns: SITES, LAT, LONG, HOUSE, TOWER, IP, DESCRIPTION, FOLDER</span>
      </div>

      <div id="grid"></div>
    </section>

    <section class="footer-panel">
      <div class="status-box">
        <div class="status-header">
          <h3>Validation Summary</h3>
        </div>

        <div class="status-line">
          <div class="status-item">
            <span class="label">Rows with data</span>
            <span class="value" id="countRows">0</span>
          </div>

          <div class="status-item success">
            <span class="label">Valid rows</span>
            <span class="value" id="countValid">0</span>
          </div>

          <div class="status-item danger">
            <span class="label">Rows with errors</span>
            <span class="value" id="countInvalid">0</span>
          </div>
        </div>
      </div>

      <div class="error-box">
        <div class="error-header">
          <h3>Validation Errors</h3>
        </div>
        <ul id="errorList">
          <li>No errors found.</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
