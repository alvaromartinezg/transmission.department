<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel to KML / KMZ</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Handsontable -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.js"></script>

  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="../assets/img/bitel_logo.png" class="logo" alt="bitel">

      <div class="title-wrap">
        <div class="title">Excel to KML / KMZ</div>
        <div class="subtitle">Paste Excel rows and export valid coordinates</div>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn header-btn secondary-dark" id="btnClear">Clear Sheet</button>
      <button class="btn header-btn" id="btnExportKML">Export KML</button>
      <button class="btn header-btn" id="btnExportKMZ">Export KMZ</button>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2>Data Grid</h2>
      <div id="grid"></div>
    </section>

    <section class="section">
      <h2>Validation Summary</h2>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">Rows with data</div>
          <div class="summary-value" id="countRows">0</div>
        </div>

        <div class="summary-card valid">
          <div class="summary-label">Valid rows</div>
          <div class="summary-value" id="countValid">0</div>
        </div>

        <div class="summary-card invalid">
          <div class="summary-label">Rows with errors</div>
          <div class="summary-value" id="countInvalid">0</div>
        </div>
      </div>
    </section>

    <section class="section error-section">
      <h2>Validation Errors</h2>
      <ul id="errorList" class="error-list">
        <li>No errors found.</li>
      </ul>
    </section>

    <div class="footer">© Excel to KML / KMZ</div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
